name: Deploy STOI Milk App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            cd /var/www/stoi-milk-app
            git reset --hard HEAD
            git pull origin main
            npm install
            npm run build
            cd server && npm install && cd ..
            pm2 delete stoi-api 2>/dev/null || true
            pm2 start src/index.js --name stoi-api --cwd /var/www/stoi-milk-app/server
            pm2 save
